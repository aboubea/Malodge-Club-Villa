[build]
builder = "NIXPACKS"
buildCommand = "npm install && npm run build --workspace=packages/shared && cd apps/backend && npx prisma generate && npx nest build"

[deploy]
startCommand = "cd apps/backend && npx prisma db push --skip-generate --accept-data-loss && node dist/main"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
